<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moose Made Media | Custom Ecommerce Development</title>
  <meta name="description" content="Moose Made Media is a development-first team building custom ecommerce experiences, front ends, integrations, and growth systems for serious brands." />
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f7f4;
      --paper: #ffffff;
      --ink: #0b0b0c;
      --muted: #5a5a60;
      --line: rgba(11,11,12,0.12);
      --line-strong: rgba(11,11,12,0.22);
      --max: 1340px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .wrap {
      width: min(calc(100% - 40px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(247,247,244,0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-inner {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 0.95;
      font-weight: 700;
    }

    .nav {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 13px;
      color: var(--muted);
    }

    .nav a:hover { color: var(--ink); }

    .hero {
      padding: 42px 0 20px;
    }

    .hero-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 22px;
    }

    .hero-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      font-size: clamp(54px, 8.4vw, 116px);
      line-height: 0.9;
      letter-spacing: -0.05em;
      font-weight: 900;
      text-transform: uppercase;
      max-width: 11ch;
    }

    .hero-side {
      max-width: 320px;
      padding-top: 8px;
    }

    .hero-side p {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 22px 0 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--ink); color: #fff; }
    .btn-secondary { background: transparent; color: var(--ink); }
    .btn-secondary:hover { background: var(--ink); color: #fff; }

    .hero-word {
      font-family: 'Inter', Arial, sans-serif;
      font-size: clamp(76px, 18vw, 250px);
      line-height: 0.82;
      font-weight: 900;
      letter-spacing: -0.07em;
      text-transform: uppercase;
      color: rgba(11,11,12,0.08);
      white-space: nowrap;
      width: 100%;
      overflow: hidden;
      user-select: none;
      pointer-events: none;
      margin-left: -10px;
    }

    .intro-band {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 22px 0;
      margin-bottom: 12px;
    }

    .intro-band p {
      margin: 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(30px, 3.5vw, 50px);
      line-height: 1.02;
      max-width: 18ch;
    }

    .section {
      padding: 22px 0 28px;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(42px, 5vw, 60px);
      line-height: 0.95;
    }

    .section-head p {
      margin: 0;
      max-width: 44ch;
      color: var(--muted);
      font-size: 15px;
    }

    .capabilities {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .capability h3 {
      margin: 0 0 10px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 30px;
      line-height: 1;
    }

    .capability p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      max-width: 34ch;
    }

    .platform-line {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
    }
